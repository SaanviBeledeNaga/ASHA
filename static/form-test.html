<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>National Health & Family Welfare Portal - Direct Benefit Form</title>
  <style>
    :root {
      --bg-color: #0F172A;
      --card-bg: #1E293B;
      --border-color: #334155;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --accent: #06B6D4;
      --accent-hover: #0891B2;
      --input-bg: #0F172A;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .header-gov {
      text-align: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 20px;
      margin-bottom: 25px;
    }

    .emblem {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-main);
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      margin-top: 5px;
    }

    .instructions {
      background-color: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.8rem;
      color: var(--accent);
      line-height: 1.4;
      margin-bottom: 25px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: var(--text-main);
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(6, 182, 212, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(90deg, #06B6D4, #7C3AED);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    .btn-submit:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Highlight effect injected dynamically by the content script */
    .autofill-highlight {
      animation: highlight-pulse 1.5s ease;
    }

    @keyframes highlight-pulse {
      0% {
        border-color: #06B6D4;
        box-shadow: 0 0 15px rgba(6, 182, 212, 0.8);
      }
      50% {
        border-color: #7C3AED;
        box-shadow: 0 0 15px rgba(124, 58, 237, 0.8);
      }
      100% {
        border-color: var(--border-color);
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-gov">
      <div class="emblem">🏛️</div>
      <h1>Direct Benefit Transfer System</h1>
      <div class="subtitle">Ministry of Health & Family Welfare • Government of India</div>
    </div>

    <div class="instructions">
      ℹ️ <strong>ASHA Copilot Helper Mode:</strong> Open the browser extension and click <strong>"Fill Form"</strong> to populate this page automatically from the desktop profile.
    </div>

    <form onsubmit="event.preventDefault(); alert('Form submitted successfully!');">
      <div class="form-group">
        <label for="full-name">Beneficiary Full Name</label>
        <input type="text" id="full-name" name="beneficiary_name" placeholder="Enter Full Name" autocomplete="off" />
      </div>

      <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
          <label for="dob">Date of Birth</label>
          <input type="text" id="dob" name="birth_date" placeholder="DD/MM/YYYY" autocomplete="off" />
        </div>
        <div>
          <label for="gender">Gender</label>
          <select id="gender" name="gender_type">
            <option value="">Select Gender</option>
            <option value="MALE">Male</option>
            <option value="FEMALE">Female</option>
            <option value="OTHER">Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="aadhaar">Aadhaar (UID) Number</label>
        <input type="text" id="aadhaar" name="national_id" placeholder="XXXX-XXXX-XXXX" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="address">Registered Address</label>
        <textarea id="address" name="full_address" placeholder="Enter full address..."></textarea>
      </div>

      <button type="submit" class="btn-submit">Submit Application</button>
    </form>
  </div>

</body>
</html>
